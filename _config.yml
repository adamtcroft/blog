# Site settings
title: My Personal Blog
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  A personal blog where I share my thoughts, projects, and experiences
  on technology, programming, and other interesting topics.
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Social media profiles
twitter_username: username
github_username:  username

# Build settings
markdown: kramdown
theme: minima

# Sass configuration
sass:
  sass_dir: _sass
  style: compressed
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md

# Pagination settings
paginate: 5
paginate_path: "/page:num/"

# Default layout for posts
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"

